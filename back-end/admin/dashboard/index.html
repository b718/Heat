<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Heat Admin</title>
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				margin: 24px;
				color: #1a1a1a;
			}
			h1 {
				margin: 0 0 16px;
				font-size: 20px;
			}
			.meta {
				color: #666;
				font-size: 13px;
				margin-bottom: 16px;
			}
			table {
				border-collapse: collapse;
				width: 100%;
				font-size: 13px;
			}
			th,
			td {
				border-bottom: 1px solid #eee;
				padding: 8px 12px;
				text-align: left;
				vertical-align: top;
			}
			th {
				background: #fafafa;
				font-weight: 600;
				position: sticky;
				top: 0;
			}
			.chip {
				display: inline-block;
				padding: 2px 8px;
				margin: 2px 4px 2px 0;
				background: #f0f0f0;
				font-size: 11px;
			}
			.chip-count {
				color: #666;
				font-weight: 600;
			}
			.empty {
				color: #999;
				font-style: italic;
			}
			tr.row-link:hover {
				background: #fafafa;
			}
			tr.row-link a {
				color: #1a1a1a;
				text-decoration: none;
				display: block;
			}
			tr.row-link a:hover {
				text-decoration: underline;
			}
			.back-link {
				display: inline-block;
				margin-bottom: 16px;
				color: #555;
				text-decoration: none;
				font-size: 13px;
			}
			.back-link:hover {
				text-decoration: underline;
			}
			.detail-section {
				margin-bottom: 24px;
			}
			.detail-section h2 {
				font-size: 14px;
				font-weight: 600;
				margin: 0 0 8px;
				color: #555;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
			.section-heading {
				display: flex;
				align-items: center;
				gap: 12px;
				margin-bottom: 8px;
			}
			.section-heading h2 {
				margin: 0;
			}
			.text-button {
				background: none;
				border: none;
				padding: 0;
				color: #0366d6;
				font-size: 12px;
				cursor: pointer;
			}
			.text-button:hover:not(:disabled) {
				text-decoration: underline;
			}
			.text-button:disabled {
				color: #999;
				cursor: not-allowed;
			}
			.genre-group-heading {
				font-size: 12px;
				font-weight: 600;
				color: #666;
				margin: 8px 0 6px;
			}
			.genre-options {
				list-style: none;
				padding: 0;
				margin: 0 0 12px;
				display: flex;
				flex-wrap: wrap;
				gap: 8px 16px;
			}
			.genre-options label {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				font-size: 13px;
				cursor: pointer;
			}
			.edit-actions {
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.error {
				color: #b00020;
				font-size: 13px;
				margin: 0 0 8px;
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="./app.tsx"></script>
	</body>
</html>
